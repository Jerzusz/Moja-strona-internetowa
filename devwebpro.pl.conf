# Redirect www to non-www (HTTPS)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.devwebpro.pl;
    ssl_certificate /etc/letsencrypt/live/devwebpro.pl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/devwebpro.pl/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    return 301 https://devwebpro.pl$request_uri;
}

# Main HTTPS server
server {
    listen [::]:443 ssl ipv6only=on;
    listen 443 ssl;
    server_name devwebpro.pl;
    root /var/www/devwebpro.pl;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/devwebpro.pl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/devwebpro.pl/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_min_length 1000;
    gzip_vary on;
    gzip_comp_level 6;

    location / {
        try_files $uri $uri/ =404;
    }

    # Cache static assets
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name devwebpro.pl www.devwebpro.pl;
    return 301 https://devwebpro.pl$request_uri;
}
